name: Publish to npm

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    name: Publish @aleph-front/ds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci


      - name: Run checks
        run: npm run check -w @aleph-front/ds

      - name: Publish
        run: npm publish
        working-directory: packages/ds
        env:
          NPM_CONFIG_PROVENANCE: true
